dataset:
  name: shanghaitech
  raw_root: data/01_raw/ShanghaiTech Campus
  processed_root: data/02_processed/shanghaitech
logging:
  progress:
    enabled: true
    mininterval: 5.0
    dynamic_ncols: true
    smoothing: 0.05
preprocess:
  fps: native
  image_ext: jpg
  jpeg_quality: 2
  overwrite: false
  frame_index_start: 1
  num_workers: 8
  image_backend: auto
  label_source: test_frame_mask
  label_mismatch_policy: error
sampling:
  context_frames: 32
  future_frames: 8
  context_sampling: dense
  context_span: 32
  gap: 0
  stride_train: 8
  stride_test: 4
  window_label: any_future_anomaly
features:
  root: data/03_features/shanghaitech
  batch_size: 32
  num_workers: 8
  dtype: float16
  high:
    type: image
    model_id: facebook/dinov2-base
    image_size: 224
    processor_do_resize: false
    processor_do_center_crop: false
    output_layer: -2
    token_mode: patch
    freeze: true
    cache: true
  z:
    type: vae
    model_id: madebyollin/sdxl-vae-fp16-fix
    image_size: 256
    z_mode: mode
    freeze: true
    cache: true
  low:
    type: optical_flow
    image_size: 256
    mode: uv_mag
    method: farneback
    cache: true
model:
  name: high_low_conditioned_z_dit
  prediction_type: velocity
  dit:
    hidden_size: 768
    num_layers: 16
    num_heads: 12
    mlp_ratio: 4.0
    dropout: 0.05
    gradient_checkpointing: true
  high_adapter:
    input_dim: auto
    max_tokens: 512
    token_reduction: aligned_grid
    foreground_ratio: 0.75
    use_pos_embedding: true
  low_adapter:
    patch_size: 16
    use_temporal_pos: true
    use_spatial_pos: true
  z_adapter:
    patch_size: 2
    use_temporal_pos: true
    use_spatial_pos: true
flow_matching:
  inference_steps: 4
  timestep_distribution: gr00t_beta
  time_embedding_scale: 1000.0
  normalize_z: true
  beta_alpha: 1.5
  beta_beta: 1.0
  beta_s: 0.999
loss:
  alpha: 0.2
  topk_fraction: 0.1
optimization:
  matmul_precision: high
  enable_tf32: true
  cudnn_benchmark: true
  enable_flash_sdp: true
  fused_adamw: auto
  prefetch_factor: 1
training:
  feature_index: data/03_features/shanghaitech/train_feature_index.jsonl
  init_checkpoint_path: null
  output_root: checkpoints
  run_id: null
  overwrite: false
  batch_size: 16
  num_workers: 4
  max_steps: 20000
  val_fraction: 0.05
  learning_rate: 0.0001
  weight_decay: 0.01
  grad_clip_norm: 1.0
  dtype: float16
  amp: true
  compile: false
  seed: 42
  log_every_steps: 50
  save_every_steps: 1000
inference:
  feature_index: data/03_features/shanghaitech/test_feature_index.jsonl
  checkpoint_path: null
  output_root: data/04_predictions/shanghaitech
  batch_size: 16
  num_workers: 4
  mode: offline_cached
  compile: false
  save_tensors: false
  overwrite: false
scoring:
  method: normalized_z_mse
  frame_aggregation: mean
  variant: mean_topk_plus_track_region
  variants:
  - global
  - global_patch
  - motion_patch
  - motion_global_patch
  - track_weighted
  - track_region_topk
  - mean_topk_plus_track_region
  topk_fraction: 0.1
  low_weight_alpha: 1.0
  low_weight_eps: 1.0e-06
  beta: 0.2
  motion_topk_fraction: 0.25
  sweep:
    betas:
    - 0.0
    - 0.1
    - 0.2
    - 0.5
    topk_fractions:
    - 0.05
    - 0.1
    - 0.2
  normalized_z_mse:
    eps: 1.0e-06
  score_normalization:
    enabled: true
    primary: video_centered
    rolling_window: 128
    rolling_windows:
    - 32
    - 64
    - 128
    - 256
    rolling_min_history: 16
  calibration:
    enabled: false
    stats_path: null
    fit_output_path: null
    group_key: scene_id
    eps: 1.0e-06
  decoded_mse:
    enabled: false
    alpha: 0.1
  track_weight_alpha: 1.0
  track_speed_alpha: 1.0
  track_trajectory_alpha: 0.5
  track_weight_max: 5.0
  track_region_beta: 0.2
