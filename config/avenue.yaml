# CUHK Avenue experiment config.

dataset:
  # Supported: avenue, cuhk_avenue.
  name: avenue
  # Expected layout: training_videos, testing_videos, ground_truth_demo/testing_label_mask.
  raw_root: data/01_raw/CUHK Avenue
  # Preprocessed frames, labels, manifests, and window indices are written here.
  processed_root: data/02_processed/avenue

logging:
  progress:
    enabled: true
    mininterval: 5.0
    dynamic_ncols: true
    smoothing: 0.05

preprocess:
  # native keeps Avenue's original 25 FPS. Use a positive integer to resample.
  fps: native
  image_ext: jpg
  jpeg_quality: 2
  overwrite: false
  frame_index_start: 1
  num_workers: 8
  image_backend: auto
  # Avenue pixel GT masks live here as *_label.mat with volLabel cell arrays.
  label_source: ground_truth_demo/testing_label_mask
  label_mismatch_policy: error

sampling:
  context_frames: 32
  future_frames: 8
  context_sampling: dense
  context_span: 32
  gap: 0
  stride_train: 8
  stride_test: 4
  window_label: any_future_anomaly

features:
  root: data/03_features/avenue
  batch_size: 32
  num_workers: 8
  dtype: float16

  high:
    type: image
    model_id: facebook/dinov2-base
    image_size: 224
    processor_do_resize: false
    processor_do_center_crop: false
    output_layer: -2
    token_mode: patch
    freeze: true
    cache: true

  z:
    type: vae
    model_id: madebyollin/sdxl-vae-fp16-fix
    image_size: 256
    z_mode: mode
    freeze: true
    cache: true

  low:
    type: optical_flow
    image_size: 256
    mode: uv_mag
    method: farneback
    cache: true

model:
  name: high_low_conditioned_z_dit
  prediction_type: velocity

  dit:
    hidden_size: 768
    num_layers: 16
    num_heads: 12
    mlp_ratio: 4.0
    dropout: 0.05
    gradient_checkpointing: true

  high_adapter:
    input_dim: auto
    max_tokens: 512
    token_reduction: aligned_grid
    foreground_ratio: 0.75
    use_pos_embedding: true

  low_adapter:
    patch_size: 16
    use_temporal_pos: true
    use_spatial_pos: true

  z_adapter:
    patch_size: 2
    use_temporal_pos: true
    use_spatial_pos: true

  condition:
    use_track_grid: false
    track_grid_gate: 0.1
    track_grid:
      ablation_mode: real
      shuffle_seed: 0
      channel_mask: all_channels
      gate_override: null

flow_matching:
  inference_steps: 4
  timestep_distribution: gr00t_beta
  time_embedding_scale: 1000.0
  normalize_z: true
  beta_alpha: 1.5
  beta_beta: 1.0
  beta_s: 0.999

loss:
  alpha: 0.2
  topk_fraction: 0.10

optimization:
  matmul_precision: high
  enable_tf32: true
  cudnn_benchmark: true
  enable_flash_sdp: true
  fused_adamw: auto
  prefetch_factor: 1

training:
  feature_index: data/03_features/avenue/train_feature_index.jsonl
  # Set checkpoints/flow_dit_large_002/best.pt here or pass --init-checkpoint for fine-tuning.
  # Only model weights are reused; Avenue train Z stats and optimizer are newly created.
  init_checkpoint_path: null
  output_root: checkpoints
  run_id: null
  overwrite: false
  batch_size: 16
  num_workers: 4
  max_steps: 20000
  val_fraction: 0.05
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip_norm: 1.0
  dtype: float16
  amp: true
  compile: false
  seed: 42
  log_every_steps: 50
  save_every_steps: 1000

inference:
  feature_index: data/03_features/avenue/test_feature_index.jsonl
  checkpoint_path: null
  output_root: data/04_predictions/avenue
  batch_size: 16
  num_workers: 4
  mode: offline_cached
  compile: false
  save_tensors: false
  overwrite: false

scoring:
  method: normalized_z_mse
  frame_aggregation: mean
  variant: global_patch
  variants:
    - global
    - patch
    - low_weighted
    - global_patch
    - motion_patch
    - motion_global_patch
  topk_fraction: 0.10
  low_weight_alpha: 1.0
  low_weight_eps: 1.0e-6
  beta: 0.2
  motion_topk_fraction: 0.25
  sweep:
    betas: [0.0, 0.1, 0.2, 0.5]
    topk_fractions: [0.05, 0.10, 0.20]

  normalized_z_mse:
    eps: 1.0e-6

  score_normalization:
    enabled: true
    primary: video_centered
    rolling_window: 128
    rolling_windows: [32, 64, 128, 256]
    rolling_min_history: 16

  calibration:
    enabled: false
    stats_path: null
    fit_output_path: null
    group_key: video_id
    eps: 1.0e-6

  decoded_mse:
    enabled: false
    alpha: 0.1
