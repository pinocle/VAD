# Production fixed-grid RGB-patch VAD experiment.

dataset:
  name: shanghai
  # MA-PDM layout: <root>/<dataset>/{training,testing}/frames/<video_id>/*.jpg
  raw_root: data/01_raw
  processed_root: data/02_processed

logging:
  progress:
    enabled: true
    mininterval: 5.0
    dynamic_ncols: true
    smoothing: 0.05

preprocess:
  image_ext: jpg
  jpeg_quality: 95
  overwrite: false
  # MA-PDM uses 1-based Shanghai filenames and 0-based filenames for other datasets.
  frame_index_start: auto

sampling:
  context_frames: 32
  future_frames: 8
  gap: 0
  # MA-PDM scans every possible starting frame by default.
  stride_train: 1
  stride_test: 1
  window_label: any_future_anomaly

model:
  name: rgb_patch_dit
  image_size: 256
  patch_size: 16
  hidden_size: 768
  num_layers: 16
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.0
  memory:
    size: 128
    temperature: 0.25

flow_matching:
  inference_steps: 12
  timestep_distribution: uniform

training:
  sample_index: data/02_processed/shanghai/metadata/samples_train.jsonl
  output_root: checkpoints
  run_id: null
  overwrite: false
  batch_size: 8
  num_workers: 8
  max_steps: 100000
  val_fraction: 0.05
  learning_rate: 0.0001
  weight_decay: 0.01
  grad_clip_norm: 1.0
  dtype: bfloat16
  amp: true
  compile: true
  seed: 42
  log_every_steps: 50
  save_every_steps: 1000

inference:
  sample_index: data/02_processed/shanghai/metadata/samples_test.jsonl
  checkpoint_path: null
  output_root: data/04_predictions/shanghai
  batch_size: 8
  num_workers: 8
  compile: true
  save_tensors: false
  overwrite: false

scoring:
  topk_fraction: 0.10
  topk_weight: 0.20
  memory_distance_weight: 0.0
