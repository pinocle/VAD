model = "gpt-5.5"
model_reasoning_effort = "xhigh"
service_tier = "fast"

sandbox_mode = "danger-full-access"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
plan_mode_reasoning_effort = "xhigh"

[projects."/workspace/VAD"]
trust_level = "trusted"

[tui]
status_line = ["model-with-reasoning", "current-dir", "model", "reasoning", "run-state", "permissions", "approval-mode", "context-remaining", "context-used", "five-hour-limit", "weekly-limit", "fast-mode"]
status_line_use_colors = true
terminal_title = ["activity", "project-name", "current-dir", "run-state", "context-remaining", "context-used", "five-hour-limit", "weekly-limit", "fast-mode", "model-with-reasoning"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 30
tool_timeout_sec = 120

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true
